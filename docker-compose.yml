services:
  mtproxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtproxy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-443}:443/tcp"
      - "127.0.0.1:8888:8888/tcp"
    volumes:
      - ./data:/data
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 443 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
